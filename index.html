<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milky Way Map</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<meta name="theme-color" content="#02041a">
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #e8eef6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow: hidden; height: 100%; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    display: flex; gap: 10px; align-items: center;
  }
  button {
    background: rgba(15,25,45,0.78); color: #e8eef6; border: 1px solid #2c4a6e;
    padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    backdrop-filter: blur(6px);
  }
  button:hover { background: rgba(35,55,85,0.95); border-color: #4878a8; }
  button.active { background: rgba(50,95,150,0.95); border-color: #6cb1ff; color: #fff; }
  .hint { opacity: .55; font-size: 12px; }
  #info {
    position: fixed; bottom: 14px; left: 14px; z-index: 10;
    background: rgba(8,14,26,0.82); border-radius: 6px;
    font-size: 13px; max-width: 380px;
    border: 1px solid #1c2c46; backdrop-filter: blur(6px);
    line-height: 1.45;
  }
  #info-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 9px 13px; cursor: pointer; user-select: none;
  }
  #info-title { font-weight: 600; }
  #info-actions { display: flex; align-items: center; gap: 8px; }
  #info-toggle {
    display: inline-block; opacity: .55; font-size: 11px;
    transition: transform .15s;
  }
  #info.collapsed #info-toggle { transform: rotate(-90deg); }
  #info.collapsed #info-body { display: none; }
  #info-body {
    padding: 0 13px 11px 13px;
    max-height: 60vh; overflow-y: auto;
  }
  #info-unpin {
    background: rgba(50,95,150,0.35); color: #e8eef6;
    border: 1px solid #4878a8; padding: 2px 9px; border-radius: 4px;
    cursor: pointer; font-size: 11px;
  }
  #info-unpin:hover { background: rgba(70,115,180,0.6); }
  .star-card {
    display: grid; grid-template-columns: max-content 1fr;
    column-gap: 14px; row-gap: 3px; align-items: baseline;
  }
  .star-card .k {
    font-size: 10.5px; opacity: .58; font-weight: 400;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .star-card .v {
    font-weight: 500; font-variant-numeric: tabular-nums;
    color: #f1f6fc;
  }
  .star-card .section {
    grid-column: 1 / -1;
    margin-top: 10px; padding-top: 7px;
    border-top: 1px solid #1c2c46;
    font-size: 10px; text-transform: uppercase; letter-spacing: .09em;
    color: #6fe6c8;
  }
  .star-card .section .count { opacity: .55; font-weight: 400; }
  .star-card .pname { font-weight: 500; color: #d0deef; }
  .star-card .pdetail { opacity: .85; font-variant-numeric: tabular-nums; }
  .star-card .more {
    grid-column: 1 / -1; opacity: .5; padding-top: 4px; font-size: 11px;
  }
  #hover .star-card { column-gap: 10px; row-gap: 2px; }
  #hover .star-card .k { font-size: 10px; letter-spacing: .04em; }
  #hover .hover-name {
    font-weight: 600; font-size: 12.5px; color: #f1f6fc;
    margin-bottom: 5px;
  }
  #hover {
    position: fixed; pointer-events: none; z-index: 11;
    background: rgba(8,14,26,0.92); padding: 8px 11px; border-radius: 4px;
    font-size: 12px; border: 1px solid #2c4a6e;
    display: none; line-height: 1.5;
    font-variant-numeric: tabular-nums;
  }
  #scale {
    position: fixed; top: 14px; right: 14px; z-index: 10;
    background: rgba(8,14,26,0.78); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; border: 1px solid #1c2c46; backdrop-filter: blur(6px);
    font-variant-numeric: tabular-nums;
  }
  #scale b { color: #6cb1ff; }
  #legend {
    position: fixed; bottom: 14px; right: 14px; z-index: 10;
    background: rgba(8,14,26,0.78); padding: 10px 13px; border-radius: 6px;
    font-size: 12px; border: 1px solid #1c2c46; backdrop-filter: blur(6px);
    line-height: 1.5; pointer-events: none; min-width: 170px;
  }
  #legend .title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    opacity: .65; margin-bottom: 6px;
  }
  #legend .row {
    display: grid; grid-template-columns: 14px 1fr;
    align-items: center; gap: 8px;
  }
  #legend .row.sub { padding-left: 16px; opacity: .85; }
  #legend .dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    justify-self: center;
  }
  #legend .group { margin-top: 4px; }
  #countbar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(8,14,26,0.78); padding: 9px 14px;
    border-radius: 6px; border: 1px solid #1c2c46; backdrop-filter: blur(6px);
    font-size: 12px; display: flex; flex-direction: column; gap: 6px;
    font-variant-numeric: tabular-nums; min-width: 380px;
  }
  #countbar .row {
    display: grid; grid-template-columns: 150px 220px 1fr;
    align-items: center; gap: 12px;
  }
  #countbar label { opacity: .85; }
  #countbar b { color: #6cb1ff; }
  #countbar .hint { opacity: .55; }
  #countbar input[type=range] {
    width: 100%; accent-color: #6cb1ff; cursor: pointer;
  }

  /* Touch devices — drop mouse-only affordances */
  @media (hover: none) {
    #ui .hint { display: none; }
    #hover     { display: none !important; }
  }

  /* Narrow viewports (mobile portrait, narrow tablets) */
  @media (max-width: 720px) {
    #ui {
      top: 8px; left: 8px; right: 86px;       /* keep room for #scale */
      flex-wrap: wrap; gap: 6px;
    }
    button { padding: 7px 10px; font-size: 12px; }
    #scale {
      top: 8px; right: 8px;
      padding: 5px 8px; font-size: 11px;
    }
    /* Drop the verbose label on mobile so the widget stays inside the
       right-edge reserve and doesn't overlap the wrapped toolbar. */
    #scale .lbl { display: none; }
    #scale::before { content: '↔ '; opacity: .55; }
    #legend { display: none; }                /* card overlap + low value on mobile */

    #countbar {
      left: 8px; right: 8px; bottom: 8px;
      transform: none; min-width: 0; max-width: none;
      padding: 9px 12px; gap: 8px;
    }
    /* label | hint on row 1, slider spanning row 2 */
    #countbar .row {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 10px; row-gap: 4px;
    }
    #countbar .row label        { grid-column: 1; grid-row: 1; }
    #countbar .row .hint        { grid-column: 2; grid-row: 1; text-align: right; }
    #countbar .row input[type=range] { grid-column: 1 / -1; grid-row: 2; }

    /* Info panel: full-width, anchored above the countbar */
    #info {
      left: 8px; right: 8px;
      max-width: none;
      bottom: 132px;
    }
    #info-body { max-height: 42vh; }
  }

  /* Very narrow phones (iPhone SE class) — buttons get one more squeeze */
  @media (max-width: 420px) {
    button { padding: 6px 8px; font-size: 11px; }
  }
</style>
</head>
<body>
  <div id="ui">
    <button id="home" title="Reset view">⌂ Home</button>
    <button id="lines" title="Toggle Sun→star sightlines">⌖ Lines</button>
    <button id="plane" title="Toggle galactic-plane polar grid">⊕ Plane</button>
    <button id="planets" title="Toggle exoplanet-host markers">○ Exoplanets</button>
    <button id="fullscreen" title="Toggle fullscreen">⛶ Fullscreen</button>
    <span class="hint">drag = rotate · wheel = zoom · right-drag = pan</span>
  </div>
  <div id="info">
    <div id="info-head">
      <span id="info-title">Loading…</span>
      <span id="info-actions">
        <button id="info-unpin" hidden>unpin</button>
        <span id="info-toggle">▾</span>
      </span>
    </div>
    <div id="info-body">fetching star catalog</div>
  </div>
  <div id="hover"></div>
  <div id="scale"><span class="lbl">camera distance: </span><b id="viewdist">—</b></div>
  <div id="legend" hidden>
    <div class="title">Planet types</div>
    <div class="row"><span class="dot" style="background:#facc15"></span>rocky</div>
    <div class="row sub"><span class="dot" style="background:#a3e635"></span>in habitable zone</div>
    <div class="row group"><span class="dot" style="background:#4ade80"></span>super-Earth</div>
    <div class="row sub"><span class="dot" style="background:#15803d"></span>in habitable zone</div>
    <div class="row group"><span class="dot" style="background:#3b82f6"></span>Neptunian</div>
    <div class="row"><span class="dot" style="background:#f97316"></span>gas giant</div>
    <div class="row"><span class="dot" style="background:#ef4444"></span>super-Jupiter</div>
  </div>
  <div id="countbar">
    <div class="row">
      <label>nearest <b id="countLabel">25,000</b> stars</label>
      <input type="range" id="countSlider" min="0" max="1000" value="799" step="1" />
      <span class="hint">~<b id="rangeLabel">— ly</b></span>
    </div>
    <div class="row">
      <label>brightness ×<b id="brightLabel">1.0</b></label>
      <input type="range" id="brightSlider" min="50" max="500" value="100" step="1" />
      <span class="hint">0.5× – 5×</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./app.js?v=13"></script>
</body>
</html>
