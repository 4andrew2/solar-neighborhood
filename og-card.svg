<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%"   stop-color="#1a2b4a" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#02041a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="disk" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#cfe2ff" stop-opacity=".55"/>
      <stop offset="55%"  stop-color="#3a5a8a" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#000820" stop-opacity="0"/>
